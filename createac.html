<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | البريق التقني المميز</title>
    <link rel="stylesheet" href="createac.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <script src="color.js"></script>

    <div class="auth-wrapper">
        
        <nav class="auth-nav">
            <button id="darkModeToggle" class="theme-btn">🌙</button>
            <a href="index.html" class="logo-text">BTM</a>
        </nav>

        <main class="auth-card">
            <div class="card-header">
                <h1 class="h">عضوية جديدة</h1>
                <p class="subtitle">ابدأ رحلتك العقارية والتقنية معنا اليوم</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); handleAuth('register');">
                
                <div class="input-wrapper">
                    <label for="username">الاسم الكامل</label>
                    <div class="input-box">
                        <span class="icon">👤</span>
                        <input type="text" id="username" placeholder="عبدالله محمد" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-box">
                        <span class="icon">📧</span>
                        <input type="email" id="email" placeholder="mail@domain.com" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label for="password">كلمة المرور</label>
                    <div class="input-box">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="أدخل 8 رموز على الأقل" required>
                    </div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">أوافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a></label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">إنشــــاء الحساب</button>

                <div class="divider">
                    <span>أو سجل عبر</span>
                </div>
                
                <div class="google-outer-container">
                    <div id="googleBtn"></div>
                </div>

                <div id="statusMessage" class="status-msg"></div>
            </form>

            <footer class="card-footer">
                <p>لديك حساب بالفعل؟ <a href="signin.html">سجل دخولك هنا</a></p>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
